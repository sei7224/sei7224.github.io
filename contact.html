<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お問い合わせ | ガジェットレビューラボ</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Hiragino Sans', 'Meiryo', sans-serif; color: #333; background: #f7f7f7; font-size: 15px; line-height: 1.9; }
    header { background: #1a1a1a; color: white; padding: 0 20px; height: 52px; display: flex; align-items: center; }
    header a { color: white; text-decoration: none; font-weight: bold; font-size: 1.05rem; }
    .container { max-width: 640px; margin: 0 auto; padding: 40px 16px 64px; }
    h1 { font-size: 1.5rem; margin-bottom: 8px; }
    .lead { color: #555; margin-bottom: 32px; font-size: 0.9rem; }
    .card { background: white; border-radius: 6px; padding: 28px; border: 1px solid #e0e0e0; }
    .form-group { margin-bottom: 20px; }
    label { display: block; font-size: 0.88rem; font-weight: bold; margin-bottom: 6px; color: #444; }
    .required { color: #e8380d; font-size: 0.75rem; margin-left: 4px; }
    input, textarea, select { width: 100%; padding: 10px 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 0.9rem; font-family: inherit; transition: border-color 0.2s; }
    input:focus, textarea:focus { outline: none; border-color: #0066cc; }
    textarea { min-height: 140px; resize: vertical; }
    .btn-submit { display: block; width: 100%; background: #e8380d; color: white; border: none; padding: 13px; border-radius: 5px; font-size: 1rem; font-weight: bold; cursor: pointer; margin-top: 8px; }
    .btn-submit:hover { background: #c22d0a; }
    .notice { background: #f0f4ff; border-left: 3px solid #3b5bdb; padding: 10px 14px; font-size: 0.82rem; color: #444; margin-bottom: 24px; border-radius: 0 4px 4px 0; }
    .email-block { background: #f9f9f9; border: 1px solid #e0e0e0; border-radius: 6px; padding: 20px; text-align: center; margin-top: 24px; }
    .email-block p { font-size: 0.85rem; color: #555; margin-bottom: 8px; }
    .email-block a { color: #0066cc; font-size: 1rem; font-weight: bold; }
    footer { background: #1a1a1a; color: #888; text-align: center; padding: 20px; font-size: 0.8rem; margin-top: 40px; }
    footer a { color: #aaa; }
  </style>
</head>
<body>
<header><a href="/">⚡ ガジェットレビューラボ</a></header>
<div class="container">
  <h1>お問い合わせ</h1>
  <p class="lead">記事の内容に関するご意見・ご指摘、掲載情報の誤りなどはこちらよりご連絡ください。</p>

  <div class="notice">
    ⚠️ 商品の購入・返品・配送に関するお問い合わせは、直接Amazon.co.jpへお問い合わせください。当サイトでは対応できません。
  </div>

  <div class="card">
    <div class="form-group">
      <label>お名前<span class="required">※必須</span></label>
      <input type="text" placeholder="例：山田 太郎">
    </div>
    <div class="form-group">
      <label>メールアドレス<span class="required">※必須</span></label>
      <input type="email" placeholder="例：example@gmail.com">
    </div>
    <div class="form-group">
      <label>お問い合わせ種別</label>
      <select>
        <option>記事内容に関するご意見・ご指摘</option>
        <option>掲載情報の誤りについて</option>
        <option>広告・掲載依頼</option>
        <option>その他</option>
      </select>
    </div>
    <div class="form-group">
      <label>お問い合わせ内容<span class="required">※必須</span></label>
      <textarea placeholder="お問い合わせ内容をご記入ください。"></textarea>
    </div>
    <button class="btn-submit" onclick="alert('お問い合わせを受け付けました。通常3営業日以内にご返信いたします。')">送信する</button>
  </div>

  <div class="email-block">
    <p>メールでの直接のお問い合わせはこちら</p>
    <a href="mailto:sei7224@gmail.com">sei7224@gmail.com</a>
  </div>
</div>
<footer>
  <p>© 2026 ガジェットレビューラボ | <a href="/">ホーム</a> | <a href="/privacy.html">プライバシーポリシー</a> | <a href="/contact.html">お問い合わせ</a></p>
</footer>
</body>
</html>
