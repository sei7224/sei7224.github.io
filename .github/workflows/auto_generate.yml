name: 記事下書き生成

on:
  schedule:
    # 週2回（月・木の日本時間 朝7時 = UTC 日22時・水22時）に下書き生成
    # 公開ではなく drafts/ に出力するため、Helpful Content Update リスクを回避
    - cron: '0 22 * * 0,3'
  workflow_dispatch:       # 手動実行も可能

permissions:
  contents: write

concurrency:
  group: article-generation
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存ライブラリをインストール
        run: pip install -r requirements.txt

      - name: 下書き記事を生成（drafts/ に出力）
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AMAZON_TRACKING_ID: ${{ secrets.AMAZON_TRACKING_ID }}
        run: python generate_article.py

      - name: 生成した下書きをコミット & プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add drafts/
          git diff --staged --quiet || git commit -m "draft: 下書きを生成 $(date '+%Y-%m-%d')"
          git push
