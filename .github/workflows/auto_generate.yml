name: 記事下書き生成

on:
  # 2026-05-18: 戦略見直しのため自動実行を停止（API費用ゼロ化）
  # 再開する場合は下記 schedule のコメントを外す
  # schedule:
  #   - cron: '0 22 * * 0,3'   # 月・木 7時JST
  workflow_dispatch:       # 手動実行のみ

permissions:
  contents: write

concurrency:
  group: article-generation
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存ライブラリをインストール
        run: pip install -r requirements.txt

      - name: 下書き記事を生成（drafts/ に出力）
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AMAZON_TRACKING_ID: ${{ secrets.AMAZON_TRACKING_ID }}
        run: python generate_article.py

      - name: 生成した下書きをコミット & プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add drafts/
          git diff --staged --quiet || git commit -m "draft: 下書きを生成 $(date '+%Y-%m-%d')"
          git push
