name: Collect product-news candidates

on:
  workflow_dispatch:
  schedule:
    - cron: "20 */6 * * *"
  push:
    branches:
      - main
    paths:
      - "pipeline/config/sources.json"
      - "pipeline/scripts/collect_candidates.py"
      - ".github/workflows/collect-candidates.yml"

permissions:
  contents: write

concurrency:
  group: gadget-pipeline-write
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Collect approved-source headlines
        run: python3 pipeline/scripts/collect_candidates.py

      - name: Commit new candidates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- pipeline/content/candidates/
          if ! git diff --staged --quiet; then
            git commit -m "collect: add product-news candidates"
            git push
          fi
