name: Publish reviewed product articles

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "pipeline/config/**"
      - "pipeline/content/products/**"
      - "pipeline/scripts/**"
      - "pipeline/static/**"
      - "pipeline/tests/**"
      - ".github/workflows/publish-reviewed-content.yml"

permissions:
  contents: write

concurrency:
  group: gadget-pipeline-write
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Test publication gates
        run: python3 -m unittest discover -s pipeline/tests -v

      - name: Render reviewed articles
        run: python3 pipeline/scripts/site_builder.py

      - name: Sync rendered public pages
        run: python3 pipeline/scripts/sync_public_root.py --source pipeline/dist --destination .

      - name: Commit generated public pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A -- .nojekyll 404.html CNAME about.html assets/ build-manifest.json contact.html index.html privacy.html robots.txt sitemap.xml articles/
          if ! git diff --staged --quiet; then
            git commit -m "publish: render reviewed product articles"
            git push
          fi
